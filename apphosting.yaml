# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Specifies that this is a Next.js application.
framework: nextjs

# Set the source directory to the root of the repository. This is crucial
# for the build system to find the package.json and Next.js app.
sourceDirectory: .

# Explicitly define the installation and build commands.
installCommand: npm ci
buildCommand: npm run build

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
